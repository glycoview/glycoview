version: "3.9"

services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    environment:
      DOCKER_API_VERSION: "1.44"
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/data
    networks:
      - edge

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-glycoview}
      POSTGRES_USER: ${POSTGRES_USER:-glycoview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glycoview} -d ${POSTGRES_DB:-glycoview}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - control

  glycoview:
    image: ${GLYCOVIEW_IMAGE:-ghcr.io/glycoview/glycoview}:${GLYCOVIEW_TAG:-latest}
    restart: unless-stopped
    environment:
      ADDR: :8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgres://${POSTGRES_USER:-glycoview}:${POSTGRES_PASSWORD:-glycoview}@postgres:5432/${POSTGRES_DB:-glycoview}?sslmode=disable
      GLYCOVIEW_AGENT_URL: http://glycoview-agent:8090
      GLYCOVIEW_AGENT_TOKEN: ${GLYCOVIEW_AGENT_TOKEN}
      UI_BUILD_ON_START: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edge
      - control
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/app/api/auth/status >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
    labels:
      - traefik.enable=true
      - traefik.docker.network=glycoview_edge
      - traefik.http.routers.glycoview.rule=Host(`${GLYCOVIEW_DOMAIN}`)
      - traefik.http.routers.glycoview.entrypoints=web
      - traefik.http.routers.glycoview-secure.rule=Host(`${GLYCOVIEW_DOMAIN}`)
      - traefik.http.routers.glycoview-secure.entrypoints=websecure
      - traefik.http.routers.glycoview-secure.tls=true
      - traefik.http.routers.glycoview-secure.tls.certresolver=letsencrypt
      - traefik.http.services.glycoview.loadbalancer.server.port=8080

  glycoview-agent:
    image: ${GLYCOVIEW_AGENT_IMAGE:-ghcr.io/glycoview/glycoview-agent}:${GLYCOVIEW_AGENT_TAG:-latest}
    restart: unless-stopped
    environment:
      GLYCOVIEW_AGENT_ADDR: :8090
      GLYCOVIEW_AGENT_TOKEN: ${GLYCOVIEW_AGENT_TOKEN}
      GLYCOVIEW_STACK_NAME: glycoview
      GLYCOVIEW_STACK_FILE: /opt/glycoview/stack/stack.yml
      GLYCOVIEW_STACK_ENV_FILE: /opt/glycoview/stack/.env
      GLYCOVIEW_RELEASES_REPO: glycoview/glycoview
      GLYCOVIEW_IMAGE_REPO: ${GLYCOVIEW_IMAGE:-ghcr.io/glycoview/glycoview}
      GLYCOVIEW_AGENT_IMAGE_REPO: ${GLYCOVIEW_AGENT_IMAGE:-ghcr.io/glycoview/glycoview-agent}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/glycoview/stack:/opt/glycoview/stack
      - /var/lib/glycoview-agent:/var/lib/glycoview-agent
    networks:
      - control

volumes:
  postgres_data:
  traefik_acme:

networks:
  edge:
  control:
