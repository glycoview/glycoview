version: "3.9"

services:
  traefik:
    image: traefik:v3.5
    command:
      - --providers.docker=true
      - --providers.docker.swarmmode=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/data/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/data
    networks:
      - edge
    deploy:
      placement:
        constraints:
          - node.role == manager

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bscout}
      POSTGRES_USER: ${POSTGRES_USER:-bscout}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bscout} -d ${POSTGRES_DB:-bscout}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - control
    deploy:
      placement:
        constraints:
          - node.role == manager

  bscout:
    image: ${BSCOUT_IMAGE:-ghcr.io/better-monitoring/bscout}:${BSCOUT_TAG:-latest}
    environment:
      ADDR: :8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: postgres://${POSTGRES_USER:-bscout}:${POSTGRES_PASSWORD:-bscout}@postgres:5432/${POSTGRES_DB:-bscout}?sslmode=disable
      UI_BUILD_ON_START: "false"
    networks:
      - edge
      - control
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/app/api/auth/status >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - traefik.enable=true
        - traefik.http.routers.bscout.rule=Host(`${BSCOUT_DOMAIN}`)
        - traefik.http.routers.bscout.entrypoints=websecure
        - traefik.http.routers.bscout.tls=true
        - traefik.http.routers.bscout.tls.certresolver=letsencrypt
        - traefik.http.services.bscout.loadbalancer.server.port=8080

  bscout-agent:
    image: ${BSCOUT_AGENT_IMAGE:-ghcr.io/better-monitoring/bscout-agent}:${BSCOUT_AGENT_TAG:-latest}
    environment:
      BSCOUT_AGENT_ADDR: :8090
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - bscout_agent_state:/var/lib/bscout-agent
    networks:
      - control
    deploy:
      placement:
        constraints:
          - node.role == manager

secrets:
  postgres_password:
    external: true

volumes:
  postgres_data:
  traefik_acme:
  bscout_agent_state:

networks:
  edge:
    driver: overlay
    attachable: true
  control:
    driver: overlay
    attachable: true
