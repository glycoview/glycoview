name: pi-image

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to embed into the appliance image
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve release tag
        id: vars
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.release_tag }}"
          fi
          echo "release_tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "image_name=glycoview-${tag}-bookworm-arm64" >>"${GITHUB_OUTPUT}"

      - name: Generate appliance OS password
        id: secrets
        run: |
          password="$(openssl rand -base64 24 | tr -d '\n' | tr '/+' 'AZ')"
          echo "os_password=${password}" >>"${GITHUB_OUTPUT}"

      - name: Prepare pi-gen stage assets
        run: |
          chmod +x deploy/pi-gen/prepare-image.sh
          deploy/pi-gen/prepare-image.sh "${{ steps.vars.outputs.release_tag }}"

      - name: Build flashable Raspberry Pi image
        id: pigen
        run: |
          chmod +x deploy/pi-gen/build-image.sh
          deploy/pi-gen/build-image.sh "${{ steps.vars.outputs.release_tag }}" "${{ steps.vars.outputs.image_name }}" "${{ steps.secrets.outputs.os_password }}"
          image_path="$(find out/pi-gen -maxdepth 1 -type f -name '*.img.xz' | head -n 1)"
          if [[ -z "${image_path}" ]]; then
            echo "pi-gen did not produce an image" >&2
            exit 1
          fi
          echo "image_path=${image_path}" >>"${GITHUB_OUTPUT}"

      - name: Generate checksum
        run: |
          sha256sum "${{ steps.pigen.outputs.image_path }}" > "${{ steps.pigen.outputs.image_path }}.sha256"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.image_name }}
          path: |
            ${{ steps.pigen.outputs.image_path }}
            ${{ steps.pigen.outputs.image_path }}.sha256

      - name: Publish release assets
        if: startsWith(steps.vars.outputs.release_tag, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.release_tag }}
          files: |
            ${{ steps.pigen.outputs.image_path }}
            ${{ steps.pigen.outputs.image_path }}.sha256
          body: |
            Flash the `.img.xz` file to a Raspberry Pi SD card with Raspberry Pi Imager.

            On first boot, the appliance generates its own database password and agent token, starts Docker, initializes the local Swarm, and deploys GlycoView automatically.

            Default local address:

            - `http://glycoview.local`

            After the first boot, open GlycoView in the browser and finish onboarding there.

            If you want to expose the appliance publicly, change the domain and TLS settings later from the web UI under `Settings`.

            This image already embeds release `${{ steps.vars.outputs.release_tag }}` for both `glycoview` and `glycoview-agent`.
