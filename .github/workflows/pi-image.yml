name: pi-image

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to embed into the appliance image
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare appliance bundle
        run: |
          mkdir -p dist/pi-image/opt/glycoview/stack
          cp deploy/swarm/stack.yml dist/pi-image/opt/glycoview/stack/stack.yml
          cp deploy/swarm/.env.example dist/pi-image/opt/glycoview/stack/.env.example
          mkdir -p dist/pi-image/opt/glycoview/bootstrap
          cp deploy/bootstrap/bootstrap.sh dist/pi-image/opt/glycoview/bootstrap/bootstrap.sh
          chmod +x dist/pi-image/opt/glycoview/bootstrap/bootstrap.sh
          mkdir -p dist/pi-image/etc/systemd/system
          cp deploy/bootstrap/glycoview-appliance-bootstrap.service dist/pi-image/etc/systemd/system/
          cp deploy/bootstrap/cloud-init-user-data.example dist/pi-image/

      - name: Archive appliance assets
        run: |
          cd dist/pi-image
          tar -czf ../glycoview-pi-appliance-${{ inputs.release_tag }}.tar.gz .

      - name: Publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: glycoview-pi-appliance-${{ inputs.release_tag }}
          path: dist/glycoview-pi-appliance-${{ inputs.release_tag }}.tar.gz

      - name: Release note
        run: |
          cat <<'EOF' > dist/release-notes.md
          This workflow currently packages the Raspberry Pi appliance payload and first-boot assets.

          The full Pi OS image build should be added on top of this by wiring pi-gen or a maintained pi-gen GitHub Action.
          EOF

      - name: Upload release asset
        if: startsWith(inputs.release_tag, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            dist/glycoview-pi-appliance-${{ inputs.release_tag }}.tar.gz
          body_path: dist/release-notes.md
