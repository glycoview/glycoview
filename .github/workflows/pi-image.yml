name: pi-image

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to embed into the appliance image
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve release tag
        id: vars
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.release_tag }}"
          fi
          echo "release_tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "image_name=glycoview-${tag}-bookworm-arm64" >>"${GITHUB_OUTPUT}"

      - name: Prepare pi-gen stage assets
        run: |
          chmod +x deploy/pi-gen/prepare-image.sh
          deploy/pi-gen/prepare-image.sh "${{ steps.vars.outputs.release_tag }}"

      - name: Build flashable Raspberry Pi image
        id: pigen
        uses: usimd/pi-gen-action@v1
        with:
          pi-gen-version: arm64
          release: bookworm
          image-name: ${{ steps.vars.outputs.image_name }}
          stage-list: stage0 stage1 stage2 ./deploy/pi-gen/stage-glycoview
          hostname: glycoview
          username: glycoview
          password: ''
          disable-first-boot-user-rename: 1
          enable-ssh: 0
          enable-cloud-init: 0
          export-last-stage-only: true
          increase-runner-disk-size: true
          compression: xz
          timezone: Europe/Berlin
          locale: en_US.UTF-8
          keyboard-keymap: us
          keyboard-layout: English (US)
          verbose-output: true

      - name: Generate checksum
        run: |
          sha256sum "${{ steps.pigen.outputs.image-path }}" > "${{ steps.pigen.outputs.image-path }}.sha256"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.image_name }}
          path: |
            ${{ steps.pigen.outputs.image-path }}
            ${{ steps.pigen.outputs.image-path }}.sha256

      - name: Publish release assets
        if: startsWith(steps.vars.outputs.release_tag, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.release_tag }}
          files: |
            ${{ steps.pigen.outputs.image-path }}
            ${{ steps.pigen.outputs.image-path }}.sha256
          body: |
            Flash the `.img.xz` file to a Raspberry Pi SD card with Raspberry Pi Imager.

            On first boot, the appliance generates its own database password and agent token, starts Docker, initializes the local Swarm, and deploys GlycoView automatically.

            Default local address:

            - `http://glycoview.local`

            After the first boot, open GlycoView in the browser and finish onboarding there.

            If you want to expose the appliance publicly, change the domain and TLS settings later from the web UI under `Settings`.

            This image already embeds release `${{ steps.vars.outputs.release_tag }}` for both `glycoview` and `glycoview-agent`.
